name: Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: |
          go build -v -o slib-go

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: slib-go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
